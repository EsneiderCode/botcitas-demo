<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot de Citas - Deutsche Glasfaser</title>
    <meta http-equiv="refresh" content="0; url=public/index-scenarios.html">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
        }
        .loading {
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid #25D366;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🤖 Bot de Citas - Deutsche Glasfaser</h1>
    <div class="loading">Redirigiendo a los escenarios...</div>
    <div class="spinner"></div>
    <p>Si no eres redirigido automáticamente, <a href="public/index-scenarios.html" style="color: #25D366;">haz clic aquí</a></p>
</body>
</html>
