<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Panel de Citas - Bot WhatsApp</title>
        <script src="/socket.io/socket.io.js"></script>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #25D366, #128C7E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
        }

        .connection-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .connection-status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: #764ba2;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
        }

        .appointments-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .section-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .appointments-container {
            max-height: 600px;
            overflow-y: auto;
        }

        .appointment-card {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .appointment-card:hover {
            background-color: #f8f9fa;
        }

        .appointment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .appointment-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .status-confirmada { background: #d4edda; color: #155724; }
        .status-pendiente { background: #fff3cd; color: #856404; }
        .status-reagendada { background: #d1ecf1; color: #0c5460; }
        .status-cancelada { background: #f8d7da; color: #721c24; }

        .appointment-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .last-updated {
            font-size: 12px;
            color: #666;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
        }
    </style>
    </head>
    <body>
        <div class="container">
            <header>
                <div class="header-content">
                    <div class="logo">
                        <div class="logo-icon">📱</div>
                        <div class="logo-text">Panel de Citas</div>
                    </div>
                    <div class="nav-buttons">
                        <a href="/" class="nav-btn active">📊 Panel
                            Principal</a>
                        <a href="/conversations.html" class="nav-btn">💬
                            Conversaciones</a>
                        <button class="nav-btn" onclick="refreshData()">🔄
                            Actualizar</button>
                    </div>
                    <div class="connection-status" id="connectionStatus">
                        <span id="connectionText">Conectando...</span>
                    </div>
                </div>
            </header>

            <div class="stats-grid" id="statsGrid">
                <!-- Estadísticas se cargarán aquí -->
            </div>

            <div class="appointments-section">
                <div class="section-header">
                    📅 Citas Agendadas <span id="appointmentCount"></span>
                </div>
                <div class="appointments-container" id="appointmentsContainer">
                    <div class="loading">Cargando citas...</div>
                </div>
                <div class="last-updated" id="lastUpdated">
                    Última actualización: --
                </div>
            </div>
        </div>

        <script>
        class AppointmentDashboard {
            constructor() {
                this.socket = io();
                this.appointments = [];
                this.stats = {};
                this.setupSocketListeners();
            }

            setupSocketListeners() {
                this.socket.on('connect', () => {
                    this.updateConnectionStatus(true);
                });

                this.socket.on('disconnect', () => {
                    this.updateConnectionStatus(false);
                });

                this.socket.on('appointmentsUpdate', (data) => {
                    this.appointments = data.appointments;
                    this.stats = data.stats;
                    this.updateStats();
                    this.renderAppointments();
                    this.updateLastUpdated(data.timestamp);
                });
            }

            updateConnectionStatus(connected) {
                const statusEl = document.getElementById('connectionStatus');
                const textEl = document.getElementById('connectionText');
                
                if (connected) {
                    statusEl.className = 'connection-status connected';
                    textEl.textContent = 'Conectado';
                } else {
                    statusEl.className = 'connection-status disconnected';
                    textEl.textContent = 'Desconectado';
                }
            }

            updateStats() {
                const statsGrid = document.getElementById('statsGrid');
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${this.stats.total || 0}</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${this.stats.confirmadas || 0}</div>
                        <div class="stat-label">Confirmadas</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${this.stats.pendientes || 0}</div>
                        <div class="stat-label">Pendientes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${this.stats.canceladas || 0}</div>
                        <div class="stat-label">Canceladas</div>
                    </div>
                `;
            }

            renderAppointments() {
                const container = document.getElementById('appointmentsContainer');
                const countEl = document.getElementById('appointmentCount');
                
                countEl.textContent = `(${this.appointments.length})`;

                if (this.appointments.length === 0) {
                    container.innerHTML = '<div class="loading">No hay citas que mostrar</div>';
                    return;
                }

                container.innerHTML = this.appointments.map(appointment => `
                    <div class="appointment-card">
                        <div class="appointment-header">
                            <div>#${appointment.id}</div>
                            <div class="appointment-status status-${appointment.estado}">
                                ${appointment.estado}
                            </div>
                        </div>
                        <div class="appointment-info">
                            <div class="info-item">
                                <div>👤 Cliente: ${appointment.cliente || 'N/A'}</div>
                            </div>
                            <div class="info-item">
                                <div>📞 Teléfono: ${appointment.telefono || 'N/A'}</div>
                            </div>
                            <div class="info-item">
                                <div>🕐 Hora: ${appointment.horaSeleccionada || 'N/A'}</div>
                            </div>
                            <div class="info-item">
                                <div>📅 Fecha: ${appointment.fechaContacto || 'N/A'}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            updateLastUpdated(timestamp) {
                const lastUpdatedEl = document.getElementById('lastUpdated');
                const date = new Date(timestamp);
                lastUpdatedEl.textContent = `Última actualización: ${date.toLocaleString()}`;
            }
        }

        // Inicializar la aplicación
        document.addEventListener('DOMContentLoaded', () => {
            new AppointmentDashboard();
        });
    </script>
    </body>
</html>
