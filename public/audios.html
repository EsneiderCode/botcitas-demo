<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje de Voz WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1014;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            background: #0a1014;
        }

        .voice-message {
            background: #056162;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 8px 0;
            max-width: 300px;
            position: relative;
        }

        .voice-message.received {
            background: #202c33;
            margin-left: 0;
            margin-right: auto;
        }

        .voice-message.sent {
            background: #056162;
            margin-left: auto;
            margin-right: 0;
        }

        .voice-content {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 40px;
        }

        .play-button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .play-button:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .play-button svg {
            width: 12px;
            height: 12px;
            fill: white;
        }

        .voice-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .waveform-container {
            height: 24px;
            display: flex;
            align-items: center;
            gap: 2px;
            overflow: hidden;
        }

        .waveform-bar {
            width: 3px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 1.5px;
            transition: all 0.1s ease;
            cursor: pointer;
        }

        .waveform-bar.played {
            background: white;
        }

        .waveform-bar:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .duration {
            font-weight: 400;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .status svg {
            width: 12px;
            height: 12px;
            fill: rgba(255, 255, 255, 0.6);
        }

        .record-interface {
            background: #202c33;
            border-radius: 24px;
            padding: 8px 16px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .record-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00a884;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .record-button:hover {
            background: #029b7a;
        }

        .record-button.recording {
            background: #ff3333;
            animation: pulse 1.5s infinite;
        }

        .record-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .record-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recording-indicator {
            color: #ff3333;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .recording-indicator.active {
            display: block;
        }

        .recording-time {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .recording-time.active {
            display: block;
        }

        .cancel-button, .send-button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cancel-button {
            background: transparent;
            display: none;
        }

        .cancel-button.active {
            display: flex;
        }

        .cancel-button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .cancel-button svg {
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.6);
        }

        .send-button {
            background: #00a884;
            display: none;
        }

        .send-button.active {
            display: flex;
        }

        .send-button:hover {
            background: #029b7a;
        }

        .send-button svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .live-waveform {
            display: none;
            height: 24px;
            align-items: center;
            gap: 2px;
        }

        .live-waveform.active {
            display: flex;
        }

        .live-bar {
            width: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 1.5px;
            transition: all 0.1s ease;
        }

        .live-bar.active {
            background: #00a884;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-align: right;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Interfaz de grabación -->
        <div class="record-interface" id="recordInterface">
            <button class="record-button" id="recordButton">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            
            <div class="record-info">
                <div class="recording-indicator" id="recordingIndicator">● REC</div>
                <div class="recording-time" id="recordingTime">0:00</div>
                <div class="live-waveform" id="liveWaveform"></div>
            </div>

            <button class="cancel-button" id="cancelButton">
                <svg viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
                </svg>
            </button>

            <button class="send-button" id="sendButton">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>

        <!-- Mensajes de voz existentes -->
        <div class="voice-message sent" id="sampleSent">
            <div class="voice-content">
                <button class="play-button" onclick="togglePlay('sampleSent')">
                    <svg class="play-icon" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="pause-icon" viewBox="0 0 24 24" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <div class="voice-info">
                    <div class="waveform-container" id="waveform-sampleSent"></div>
                    <div class="time-info">
                        <span class="duration">0:15</span>
                        <div class="status">
                            <span>22:30</span>
                            <svg viewBox="0 0 16 15"><path d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.319.319 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.063-.51z" fill="#4fc3f7"/><path d="M5.09 9.05l6.312-6.012a.366.366 0 0 0-.063-.51l-.478-.372a.365.365 0 0 0-.51.063L4.005 9.07a.32.32 0 0 1-.484.033L1.86 7.769a.319.319 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l2.31 2.217c.143.14.361.125.484-.033z" fill="#4fc3f7"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="voice-message received" id="sampleReceived">
            <div class="voice-content">
                <button class="play-button" onclick="togglePlay('sampleReceived')">
                    <svg class="play-icon" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="pause-icon" viewBox="0 0 24 24" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <div class="voice-info">
                    <div class="waveform-container" id="waveform-sampleReceived"></div>
                    <div class="time-info">
                        <span class="duration">0:08</span>
                        <div class="status">
                            <span>22:28</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let recordingStartTime;
        let recordingInterval;
        let isRecording = false;
        let recordedBlob = null;
        let liveWaveformInterval;

        // Elementos DOM
        const recordButton = document.getElementById('recordButton');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const recordingTime = document.getElementById('recordingTime');
        const liveWaveform = document.getElementById('liveWaveform');
        const cancelButton = document.getElementById('cancelButton');
        const sendButton = document.getElementById('sendButton');

        // Estado de reproducción
        const playStates = {};

        // Inicializar formas de onda para mensajes existentes
        function initializeWaveform(containerId, bars = 20) {
            const container = document.getElementById('waveform-' + containerId);
            container.innerHTML = '';
            
            for (let i = 0; i < bars; i++) {
                const bar = document.createElement('div');
                bar.className = 'waveform-bar';
                bar.style.height = Math.random() * 16 + 4 + 'px';
                bar.addEventListener('click', () => seekToPosition(containerId, i / bars));
                container.appendChild(bar);
            }
        }

        // Inicializar forma de onda en vivo
        function initializeLiveWaveform() {
            liveWaveform.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const bar = document.createElement('div');
                bar.className = 'live-bar';
                bar.style.height = '4px';
                liveWaveform.appendChild(bar);
            }
        }

        // Animar forma de onda en vivo
        function animateLiveWaveform() {
            const bars = liveWaveform.querySelectorAll('.live-bar');
            bars.forEach((bar, index) => {
                const height = Math.random() * 16 + 4;
                bar.style.height = height + 'px';
                bar.classList.toggle('active', Math.random() > 0.5);
            });
        }

        // Solicitar permisos de micrófono
        async function requestMicrophonePermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                return stream;
            } catch (err) {
                alert('No se pudo acceder al micrófono: ' + err.message);
                return null;
            }
        }

        // Iniciar grabación
        async function startRecording() {
            const stream = await requestMicrophonePermission();
            if (!stream) return;

            isRecording = true;
            audioChunks = [];
            recordingStartTime = Date.now();

            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                recordedBlob = blob;
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();

            // UI changes
            recordButton.classList.add('recording');
            recordingIndicator.classList.add('active');
            recordingTime.classList.add('active');
            liveWaveform.classList.add('active');
            cancelButton.classList.add('active');
            sendButton.classList.add('active');

            // Start timer
            recordingInterval = setInterval(updateRecordingTime, 100);
            liveWaveformInterval = setInterval(animateLiveWaveform, 100);
        }

        // Detener grabación
        function stopRecording() {
            if (!isRecording) return;

            isRecording = false;
            mediaRecorder.stop();

            // UI changes
            recordButton.classList.remove('recording');
            recordingIndicator.classList.remove('active');
            recordingTime.classList.remove('active');
            liveWaveform.classList.remove('active');

            clearInterval(recordingInterval);
            clearInterval(liveWaveformInterval);
        }

        // Cancelar grabación
        function cancelRecording() {
            stopRecording();
            recordedBlob = null;
            
            cancelButton.classList.remove('active');
            sendButton.classList.remove('active');
            recordingTime.textContent = '0:00';
        }

        // Enviar mensaje de voz
        function sendVoiceMessage() {
            if (!recordedBlob) return;

            const duration = Math.floor((Date.now() - recordingStartTime) / 1000);
            const messageId = 'voice-' + Date.now();
            
            createVoiceMessage(messageId, duration, true);
            
            // Reset UI
            cancelButton.classList.remove('active');
            sendButton.classList.remove('active');
            recordingTime.textContent = '0:00';
            recordedBlob = null;
        }

        // Crear mensaje de voz
        function createVoiceMessage(id, duration, isSent = true) {
            const container = document.querySelector('.chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = `voice-message ${isSent ? 'sent' : 'received'}`;
            messageDiv.id = id;

            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                             now.getMinutes().toString().padStart(2, '0');

            messageDiv.innerHTML = `
                <div class="voice-content">
                    <button class="play-button" onclick="togglePlay('${id}')">
                        <svg class="play-icon" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg class="pause-icon" viewBox="0 0 24 24" style="display: none;">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <div class="voice-info">
                        <div class="waveform-container" id="waveform-${id}"></div>
                        <div class="time-info">
                            <span class="duration">0:${duration.toString().padStart(2, '0')}</span>
                            <div class="status">
                                <span>${timeString}</span>
                                ${isSent ? '<svg viewBox="0 0 16 15"><path d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.319.319 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.063-.51z" fill="#4fc3f7"/><path d="M5.09 9.05l6.312-6.012a.366.366 0 0 0-.063-.51l-.478-.372a.365.365 0 0 0-.51.063L4.005 9.07a.32.32 0 0 1-.484.033L1.86 7.769a.319.319 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l2.31 2.217c.143.14.361.125.484-.033z" fill="#4fc3f7"/></svg>' : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            container.appendChild(messageDiv);
            initializeWaveform(id);
        }

        // Actualizar tiempo de grabación
        function updateRecordingTime() {
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            recordingTime.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Toggle play/pause
        function togglePlay(messageId) {
            const message = document.getElementById(messageId);
            const playButton = message.querySelector('.play-button');
            const playIcon = playButton.querySelector('.play-icon');
            const pauseIcon = playButton.querySelector('.pause-icon');

            if (playStates[messageId]) {
                // Pause
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playStates[messageId] = false;
                clearInterval(playStates[messageId + '_interval']);
            } else {
                // Play
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playStates[messageId] = true;
                
                // Simulate playback progress
                let progress = 0;
                const bars = message.querySelectorAll('.waveform-bar');
                const interval = setInterval(() => {
                    if (progress >= bars.length || !playStates[messageId]) {
                        // Reset
                        bars.forEach(bar => bar.classList.remove('played'));
                        playIcon.style.display = 'block';
                        pauseIcon.style.display = 'none';
                        playStates[messageId] = false;
                        clearInterval(interval);
                        return;
                    }
                    
                    bars[progress].classList.add('played');
                    progress++;
                }, 150);
                
                playStates[messageId + '_interval'] = interval;
            }
        }

        // Seek to position
        function seekToPosition(messageId, position) {
            const message = document.getElementById(messageId);
            const bars = message.querySelectorAll('.waveform-bar');
            const targetIndex = Math.floor(position * bars.length);
            
            bars.forEach((bar, index) => {
                if (index <= targetIndex) {
                    bar.classList.add('played');
                } else {
                    bar.classList.remove('played');
                }
            });
        }

        // Event listeners
        recordButton.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        cancelButton.addEventListener('click', cancelRecording);
        sendButton.addEventListener('click', sendVoiceMessage);

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeWaveform('sampleSent', 25);
            initializeWaveform('sampleReceived', 15);
            initializeLiveWaveform();
        });

        // Prevent context menu on long press (mobile)
        document.addEventListener('contextmenu', (e) => {
            if (e.target.closest('.record-button')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
